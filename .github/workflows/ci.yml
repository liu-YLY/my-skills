name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Install yamllint
        run: pip install yamllint

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Validate JSON files
        run: |
          echo "Validating all .json files..."
          find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*" | while read f; do
            python -c "import json,sys; json.load(open('$f', encoding='utf-8'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON files valid."

      - name: Validate YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}" \
            .pre-commit-config.yaml \
            .github/workflows/ci.yml

      - name: Lint Markdown files
        run: |
          markdownlint \
            --disable MD013 MD024 MD033 MD041 \
            --ignore .git \
            --ignore node_modules \
            '*.md' \
            'plugins/**/*.md' \
            'docs/**/*.md' \
            '.github/**/*.md' || true
          echo "Markdown lint completed (warnings allowed)."

      - name: Run pre-commit
        run: pre-commit run --all-files
        continue-on-error: false

      - name: Check SKILL.md / README.md version sync
        run: |
          echo "Checking version sync for all skills..."
          python - <<'PYEOF'
          import os
          import re
          import json
          from pathlib import Path

          root = Path('.')
          skills = list(root.glob('plugins/*/skills/*/'))
          errors = []

          for skill_dir in skills:
              skill_md = skill_dir / 'SKILL.md'
              readme_md = skill_dir / 'README.md'
              if not skill_md.exists():
                  continue
              # Extract version from SKILL.md frontmatter
              content = skill_md.read_text(encoding='utf-8')
              m = re.search(r'^version:\s*"?([\d.]+)"?', content, re.MULTILINE)
              if not m:
                  errors.append(f"{skill_md}: version field not found in frontmatter")
                  continue
              skill_version = m.group(1)
              # Check plugin.json version (if exists)
              for plugin_json in (skill_dir.parent.parent / '.claude-plugin' / 'plugin.json',
                                  skill_dir.parent.parent / '.cursor-plugin' / 'plugin.json',
                                  skill_dir.parent.parent / '.codex-plugin' / 'plugin.json'):
                  if plugin_json.exists():
                      try:
                          data = json.loads(plugin_json.read_text(encoding='utf-8'))
                          plugin_version = data.get('version', '')
                          if plugin_version and plugin_version != skill_version:
                              errors.append(
                                  f"{plugin_json}: version {plugin_version} != SKILL.md {skill_version}"
                              )
                      except json.JSONDecodeError as e:
                          errors.append(f"{plugin_json}: invalid JSON - {e}")

          if errors:
              print("Version sync issues found:")
              for e in errors:
                  print(f"  - {e}")
              exit(1)
          else:
              print("All version numbers are in sync.")
          PYEOF

      - name: Check knowledge file count (≥4 for non-meta skills)
        run: |
          echo "Checking knowledge file count..."
          python - <<'PYEOF'
          import sys
          from pathlib import Path

          root = Path('.')
          # testing-bundle is a meta skill, exempted
          exempted = {'testing-bundle'}
          skills = list(root.glob('plugins/*/skills/*/'))
          warnings = []

          for skill_dir in skills:
              skill_name = skill_dir.name
              if skill_name in exempted:
                  continue
              knowledge_dir = skill_dir / 'knowledge'
              if not knowledge_dir.exists():
                  warnings.append(f"{skill_dir}: knowledge/ directory missing")
                  continue
              md_files = list(knowledge_dir.glob('*.md'))
              # Exclude subdirectories like industry-templates/, products/
              if len(md_files) < 4:
                  warnings.append(
                      f"{skill_dir}: knowledge/ has only {len(md_files)} .md files (expected ≥4)"
                  )

          if warnings:
              print("Knowledge file count warnings:")
              for w in warnings:
                  print(f"  - {w}")
              # Warnings only, not failures
              print("\nNote: These are warnings, not failures. Some skills may have design exemptions.")
          else:
              print("All non-meta skills have ≥4 knowledge files.")
          PYEOF
